version: '3.8'

services:
  bot:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres/chronos
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HTTP_PROXY=${HTTP_PROXY}
    depends_on:
      - chromadb
      - postgres
    volumes:
      - ./data:/app/data  # For persistent storage if needed

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=chronos
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
